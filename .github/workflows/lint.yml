name: Lint Python code

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12.1"

      - run: pip install ruff==0.15.8

      - run: ruff check .

      - run: ruff format --check .